<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nyilászáró Felmérő</title>
<style>
  body{background:#0a0a0a;margin:0;}
  #loading{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial,sans-serif;color:#f0f0f0;gap:20px;}
  .lt{font-size:20px;font-weight:bold;letter-spacing:3px;text-transform:uppercase;}
  .lt span{color:#cc2222;}
  .lb{width:200px;height:3px;background:#2e2e2e;overflow:hidden;}
  .lbi{height:100%;background:#cc2222;animation:ld 1.5s ease-in-out infinite;}
  @keyframes ld{0%{width:0%;margin-left:0}50%{width:100%;margin-left:0}100%{width:0%;margin-left:100%}}
  .ls{font-size:12px;color:#5a5a5a;letter-spacing:1px;}
  #err{display:none;text-align:center;color:#cc2222;font-size:14px;max-width:300px;line-height:1.6;}
  #err button{background:#cc2222;color:#fff;border:none;padding:10px 20px;cursor:pointer;font-size:14px;margin-top:10px;}
</style>
</head>
<body>
<div id="loading">
  <div class="lt">Nyilász<span>á</span>ró <span>▸</span> Felmérő</div>
  <div class="lb"><div class="lbi"></div></div>
  <div class="ls" id="ls">Alkalmazás betöltése...</div>
  <div id="err">
    ❌ Nem sikerült betölteni.<br>
    Ellenőrizd az internet kapcsolatot!<br>
    <button onclick="location.reload()">🔄 Újra</button>
  </div>
</div>
<div id="app-root"></div>
<script>
const APP_URL = 'https://raw.githubusercontent.com/Minosegiablak/Felmero/main/app.js';

fetch(APP_URL + '?v=' + Date.now())
  .then(r => {
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  })
  .then(code => {
    const fn = new Function(code);
    fn();
    document.getElementById('loading').style.display = 'none';
  })
  .catch(err => {
    console.error('Betöltési hiba:', err);
    document.getElementById('ls').style.display = 'none';
    document.querySelector('.lb').style.display = 'none';
    document.getElementById('err').style.display = 'block';
  });
</script>
</body>
</html>
