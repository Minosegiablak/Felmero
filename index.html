<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nyilászáró Felmérő</title>
<style>
  body { background: #0a0a0a; margin: 0; }
  #loading {
    position: fixed; inset: 0;
    background: #0a0a0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: Arial, sans-serif; color: #f0f0f0;
    gap: 20px;
  }
  .loading-title {
    font-size: 20px; font-weight: bold;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .loading-title span { color: #cc2222; }
  .loading-bar { width: 200px; height: 3px; background: #2e2e2e; overflow: hidden; }
  .loading-bar-inner { height: 100%; background: #cc2222; animation: load 1.5s ease-in-out infinite; }
  @keyframes load {
    0% { width: 0%; margin-left: 0; }
    50% { width: 100%; margin-left: 0; }
    100% { width: 0%; margin-left: 100%; }
  }
  .loading-sub { font-size: 12px; color: #5a5a5a; letter-spacing: 1px; }
  #error-box { display:none; text-align:center; color:#cc2222; font-size:14px; max-width:300px; line-height:1.6; }
</style>
</head>
<body>
<div id="loading">
  <div class="loading-title">Nyilász<span>á</span>ró <span>▸</span> Felmérő</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
  <div class="loading-sub">Alkalmazás betöltése...</div>
  <div id="error-box">
    ❌ Nem sikerült betölteni.<br>Ellenőrizd az internet kapcsolatot!<br><br>
    <button onclick="location.reload()" style="background:#cc2222;color:#fff;border:none;padding:10px 20px;cursor:pointer;font-size:14px;">🔄 Újra</button>
  </div>
</div>
<div id="app-root"></div>
<script>
const APP_URL = 'https://raw.githubusercontent.com/Minosegiablak/Felmero/main/app.js';
function loadApp(){
  const s=document.createElement('script');
  s.src=APP_URL+'?v='+Date.now();
  s.onload=()=>document.getElementById('loading').style.display='none';
  s.onerror=()=>{
    document.querySelector('.loading-sub').style.display='none';
    document.querySelector('.loading-bar').style.display='none';
    document.getElementById('error-box').style.display='block';
  };
  document.head.appendChild(s);
}
loadApp();
</script>
</body>
</html>
